version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  test-linux:
    # El executor es x86_64 (Docker, el más barato/rápido disponible): la suite
    # es arch-independiente y mockea el engine (torch/onnxruntime no se ejercitan),
    # así que no hay señal adicional en re-correrla en ARM64. Justificación
    # completa (simetría 3 tests / 4 builds) en docs/BUILD.md §4.
    docker:
      # Imagen fijada por digest (R-14): el digest es el del manifest list del
      # tag 3.13 (multi-arch, válido para amd64 y arm64), así que los tres jobs
      # Docker comparten el mismo pin. Bump manual: tomar el digest vigente de
      # https://hub.docker.com/v2/repositories/cimg/python/tags/3.13 y
      # reemplazarlo en las TRES referencias de este archivo (procedimiento
      # completo en docs/BUILD.md §Reproducibilidad).
      - image: cimg/python:3.13@sha256:9d189f873178a2bea234b7d51e31e1ae01a73646e962cf697f757b588f8d77b6
    steps:
      - checkout
      - run:
          name: Install apt build deps (libasound2-dev)
          command: |
            echo "[STEP] Install apt build deps (libasound2-dev) - INICIO"
            sudo apt-get update
            sudo apt-get install -y libasound2-dev
            echo "[STEP] Install apt build deps (libasound2-dev) - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner (sin pins de herramientas). Al no incluir el pin, la caché de
          # venv es compartida entre este job de test y el build de la misma
          # plataforma+lockfile (build-linux-x64): el test la puebla, el build
          # acierta HIT. Un cambio de Python o del lockfile la invalida.
          name: Compute venv cache key (python --version)
          command: |
            echo "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version > cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
      - run:
          # Instalación reproducible desde el lock CPU-only con hashes
          # (--require-hashes rechaza cualquier paquete sin hash o no fijado).
          # Se usa el lock CPU (no el universal): la suite mockea el engine
          # (torch no se ejercita) y el build de esta misma plataforma
          # (build-linux-x64) ya instala exactamente este lock, así que el
          # stack nvidia-*-cu12 del lock universal solo agregaría varios GB
          # sin señal adicional. Las dependencias viven en un venv cacheado:
          # en cache hit, pip re-verifica el lock como no-op rápido.
          name: Install runtime deps from CPU-only lock (require-hashes)
          command: |
            echo "[STEP] Install runtime deps from CPU-only lock (require-hashes) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            pip install pip==26.1.2
            pip install -r requirements-lock-linux-cpu.txt --require-hashes --extra-index-url https://download.pytorch.org/whl/cpu
            echo "[STEP] Install runtime deps from CPU-only lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
          paths:
            - ~/.venv
      - run:
          # La herramienta de test (pytest) se instala DESPUÉS del save_cache, sobre
          # el venv ya poblado: así queda fuera del material cacheado y la caché de
          # venv la comparten test y build de esta plataforma. Reinstalarla cuesta
          # segundos (sin dependencias pesadas).
          # Política de pins (S1-30): pytest va pineado a versión exacta. Hoy el
          # proyecto NO usa plugins de pytest, así que no hay nada más que fijar;
          # esta política es deliberadamente solo documental (un guard automático
          # de plugins sería sobreingeniería sin valor actual). Si en el futuro se
          # añade un plugin (pytest-xdist, pytest-timeout, ...), la propuesta de
          # diseño es: declararlo PINNADO en una única fuente de verdad (p.ej.
          # PYTEST_PLUGINS) e instalarlo desde ahí, y añadir un guard en CI que
          # falle si aparece un plugin pytest-* no declarado. Mantener los TRES
          # jobs de test (Linux/Windows/macOS) alineados para evitar drift.
          name: Install pytest into venv (post-cache)
          command: |
            echo "[STEP] Install pytest into venv (post-cache) - INICIO"
            pip install pytest==9.1.1
            echo "[STEP] Install pytest into venv (post-cache) - FIN"
      - run:
          # WARNING-04: CLAUDE.md documenta py_compile como chequeo de verificación,
          # pero no corría en CI; compileall detecta errores de sintaxis en módulos
          # sin tests propios o importados condicionalmente, antes del build.
          name: Check src/ syntax (compileall)
          command: |
            echo "[STEP] Check src/ syntax (compileall) - INICIO"
            python -m compileall src/
            echo "[STEP] Check src/ syntax (compileall) - FIN"
      - run:
          name: Run pytest suite over tests/
          command: |
            echo "[STEP] Run pytest suite over tests/ - INICIO"
            pytest tests/ -v
            echo "[STEP] Run pytest suite over tests/ - FIN"

  test-windows:
    # R-22: la suite corría solo en Linux; todo el código específico de Windows
    # (pycaw/COM, winsound, generación del .iss) se ejercitaba solo con mocks.
    # Este job corre la suite completa en Windows nativo y actúa como puerta de
    # los builds junto a `test-linux` y `test-macos` (triple puerta simétrica).
    executor: win/server-2022
    steps:
      - checkout
      - run:
          # Pin de Chocolatey (espejo de build-windows-x64): un release nuevo no debe
          # romper el job sin cambios en el repo.
          name: Set up Python 3.13 via choco (pinned 3.13.14)
          command: |
            Write-Host "[STEP] Set up Python 3.13 via choco (pinned 3.13.14) - INICIO"
            choco install python313 -y --version=3.13.14
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Set up Python 3.13 via choco (pinned 3.13.14) - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner (sin pins de herramientas). Al no incluir el pin, la caché de
          # venv es compartida entre este job de test y build-windows-x64: el test
          # la puebla, el build acierta HIT.
          name: Compute venv cache key (python --version)
          command: |
            Write-Host "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version | Out-File -Encoding ascii cache-key.txt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Get-Content cache-key.txt
            Write-Host "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Dependencias en un venv del proyecto (.venv) cacheado. PowerShell no
          # tiene el equivalente de $BASH_ENV para activar el venv entre steps:
          # los steps posteriores invocan .venv\Scripts\python.exe por ruta
          # explícita. En cache hit, pip re-verifica el lock como no-op rápido.
          name: Install runtime deps from universal lock (require-hashes)
          command: |
            Write-Host "[STEP] Install runtime deps from universal lock (require-hashes) - INICIO"
            python --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path .venv)) { python -m venv .venv }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install pip==26.1.2
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install -r requirements-lock.txt --require-hashes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install runtime deps from universal lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - .venv
      - run:
          # La herramienta de test (pytest) se instala DESPUÉS del save_cache, sobre
          # el venv ya poblado: así queda fuera del material cacheado y la caché de
          # venv la comparten test y build de esta plataforma.
          # Política de pins (S1-30): pytest va pineado a versión exacta. Hoy el
          # proyecto NO usa plugins de pytest, así que no hay nada más que fijar;
          # esta política es deliberadamente solo documental (un guard automático
          # de plugins sería sobreingeniería sin valor actual). Si en el futuro se
          # añade un plugin (pytest-xdist, pytest-timeout, ...), la propuesta de
          # diseño es: declararlo PINNADO en una única fuente de verdad (p.ej.
          # PYTEST_PLUGINS) e instalarlo desde ahí, y añadir un guard en CI que
          # falle si aparece un plugin pytest-* no declarado. Mantener los TRES
          # jobs de test (Linux/Windows/macOS) alineados para evitar drift.
          name: Install pytest into venv (post-cache)
          command: |
            Write-Host "[STEP] Install pytest into venv (post-cache) - INICIO"
            .venv\Scripts\python.exe -m pip install pytest==9.1.1
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install pytest into venv (post-cache) - FIN"
      - run:
          name: Run pytest suite over tests/
          command: |
            Write-Host "[STEP] Run pytest suite over tests/ - INICIO"
            .venv\Scripts\python.exe -m pytest tests/ -v
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Run pytest suite over tests/ - FIN"

  test-macos:
    # Equivalencia de cobertura con test-linux/test-windows: sin un Mac físico
    # disponible, el gate en CI es la única validación de la plataforma macOS
    # (playback vía afplay/sounddevice, rutas y señales POSIX del user-data-dir)
    # antes de que un usuario real la pruebe. Corre la suite completa en macOS
    # nativo y actúa como puerta de los builds (triple puerta simétrica).
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - pyenv-v1-{{ arch }}-3.13.14-xcode26.4
      - run:
          # Pin EXACTO de Python 3.13.14 vía pyenv (espejo del pin de Chocolatey
          # en los jobs Windows): no usar el python3 del sistema sin fijar, para
          # testear sobre la misma versión que empaqueta el build, y con patch
          # fijo para que la clave de cache del CPython compilado sea estable.
          # no_output_timeout holgado: pyenv compila CPython desde fuente con
          # output escaso (~10 min) en el primer miss; con cache restaurado,
          # `pyenv install -s` salta la compilación en segundos. La clave del
          # cache incluye la versión de Xcode: el CPython compilado depende del
          # SDK del runner. `brew upgrade pyenv` es obligatorio antes de fijar
          # un patch exacto: el pyenv preinstalado en la imagen puede no traer
          # localmente la definición del patch más reciente (python-build es
          # un snapshot vendido con el formula de Homebrew, no se actualiza solo).
          # Excepción consciente de pin (R-14): Homebrew no soporta fijar una
          # versión de pyenv, y la versión de pyenv no altera el artefacto —
          # el CPython resultante ya está pineado (3.13.14).
          name: Set up Python 3.13 via pyenv (pinned 3.13.14)
          no_output_timeout: 20m
          command: |
            echo "[STEP] Set up Python 3.13 via pyenv (pinned 3.13.14) - INICIO"
            brew update && brew upgrade pyenv
            pyenv install -s 3.13.14
            pyenv global 3.13.14
            pyenv rehash
            python --version
            echo "[STEP] Set up Python 3.13 via pyenv (pinned 3.13.14) - FIN"
      - save_cache:
          key: pyenv-v1-{{ arch }}-3.13.14-xcode26.4
          paths:
            - ~/.pyenv/versions
      - run:
          # Material de la clave de cache del venv: versión exacta de Python (sin
          # pins de herramientas). Al no incluir el pin, la caché de venv es
          # compartida entre este job de test y build-darwin-arm64: el test la
          # puebla, el build acierta HIT.
          name: Compute venv cache key (python --version)
          command: |
            echo "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version > cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Instalación reproducible desde el lock universal con hashes, en un
          # venv cacheado: en cache hit, pip re-verifica el lock como no-op.
          name: Install runtime deps from universal lock (require-hashes)
          command: |
            echo "[STEP] Install runtime deps from universal lock (require-hashes) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            python -m pip install pip==26.1.2
            python -m pip install -r requirements-lock.txt --require-hashes
            echo "[STEP] Install runtime deps from universal lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - ~/.venv
      - run:
          # La herramienta de test (pytest) se instala DESPUÉS del save_cache, sobre
          # el venv ya poblado: así queda fuera del material cacheado y la caché de
          # venv la comparten test y build de esta plataforma.
          # Política de pins (S1-30): pytest va pineado a versión exacta. Hoy el
          # proyecto NO usa plugins de pytest, así que no hay nada más que fijar;
          # esta política es deliberadamente solo documental (un guard automático
          # de plugins sería sobreingeniería sin valor actual). Si en el futuro se
          # añade un plugin (pytest-xdist, pytest-timeout, ...), la propuesta de
          # diseño es: declararlo PINNADO en una única fuente de verdad (p.ej.
          # PYTEST_PLUGINS) e instalarlo desde ahí, y añadir un guard en CI que
          # falle si aparece un plugin pytest-* no declarado. Mantener los TRES
          # jobs de test (Linux/Windows/macOS) alineados para evitar drift.
          name: Install pytest into venv (post-cache)
          command: |
            echo "[STEP] Install pytest into venv (post-cache) - INICIO"
            python -m pip install pytest==9.1.1
            echo "[STEP] Install pytest into venv (post-cache) - FIN"
      - run:
          name: Run pytest suite over tests/
          command: |
            echo "[STEP] Run pytest suite over tests/ - INICIO"
            python -m pytest tests/ -v
            echo "[STEP] Run pytest suite over tests/ - FIN"

  test-installer-linux:
    # Smoke-test de install.sh (docs/SELF-HOSTED-INSTALL.md): valida el script
    # sin red real, mockeando curl/uname/sha256sum por PATH (tests/installer/).
    # cimg/base es una imagen liviana (Ubuntu), suficiente porque el job no
    # compila nada: solo instala bats-core y corre el smoke-test de shell.
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Install bats-core
          command: |
            echo "[STEP] Install bats-core - INICIO"
            sudo apt-get update
            sudo apt-get install -y bats
            echo "[STEP] Install bats-core - FIN"
      - run:
          name: Run install.sh smoke-test (bats)
          command: |
            echo "[STEP] Run install.sh smoke-test (bats) - INICIO"
            # Acotado a install.bats: install-macos.bats corre en el executor
            # macOS (job test-installer-macos), no en este runner Linux.
            bats tests/installer/install.bats
            echo "[STEP] Run install.sh smoke-test (bats) - FIN"

  test-installer-windows:
    # Smoke-test de install.ps1 (docs/SELF-HOSTED-INSTALL.md): valida el script
    # sin red ni instalación reales, mockeando las funciones propias del script
    # con Pester v5 (tests/installer/install.tests.ps1) — espejo de
    # test-installer-linux. Mismo executor Windows que test-windows; Pester
    # pineado (el server-2022 trae Pester 3.x, y un release nuevo de Pester no
    # debe romper el job sin cambios en el repo).
    executor: win/server-2022
    steps:
      - checkout
      - run:
          name: Install Pester (pinned 5.8.0)
          command: |
            Write-Host "[STEP] Install Pester (pinned 5.8.0) - INICIO"
            Install-Module Pester -RequiredVersion 5.8.0 -Force -SkipPublisherCheck -Scope CurrentUser
            if ($LASTEXITCODE -ne $null -and $LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install Pester (pinned 5.8.0) - FIN"
      - run:
          name: Run install.ps1 smoke-test (Pester)
          command: |
            Write-Host "[STEP] Run install.ps1 smoke-test (Pester) - INICIO"
            Import-Module Pester -RequiredVersion 5.8.0
            Invoke-Pester tests/installer/install.tests.ps1 -CI
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Run install.ps1 smoke-test (Pester) - FIN"

  test-installer-macos:
    # Smoke-test de install-macos.sh (docs/SELF-HOSTED-INSTALL.md): valida el
    # script sin red ni .dmg reales, mockeando curl/uname/hdiutil/xattr/ditto
    # por PATH (tests/installer/install-macos.bats) — espejo de
    # test-installer-linux/-windows. Corre en el executor macOS real (mismo que
    # test-macos) para validar sobre el shell nativo de la plataforma, la única
    # validación posible sin un Mac físico del propietario.
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Install bats-core
          command: |
            echo "[STEP] Install bats-core - INICIO"
            brew install bats-core
            echo "[STEP] Install bats-core - FIN"
      - run:
          name: Run install-macos.sh smoke-test (bats)
          command: |
            echo "[STEP] Run install-macos.sh smoke-test (bats) - INICIO"
            bats tests/installer/install-macos.bats
            echo "[STEP] Run install-macos.sh smoke-test (bats) - FIN"

  build-windows-x64:
    executor: win/server-2022
    steps:
      - checkout
      - run:
          # SUGGESTION-06: sin pin, un release nuevo de Chocolatey puede romper
          # el build sin cambios en el repo. Versión fijada al momento de escribir
          # este pin; actualizar deliberadamente cuando se quiera adoptar una nueva.
          name: Set up Python 3.13 via choco (pinned 3.13.14)
          command: |
            Write-Host "[STEP] Set up Python 3.13 via choco (pinned 3.13.14) - INICIO"
            choco install python313 -y --version=3.13.14
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Set up Python 3.13 via choco (pinned 3.13.14) - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner (sin pins de herramientas). Al no incluir el pin, la caché de
          # venv es compartida con test-windows: el test la puebla, este build
          # acierta HIT.
          name: Compute venv cache key (python --version)
          command: |
            Write-Host "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version | Out-File -Encoding ascii cache-key.txt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Get-Content cache-key.txt
            Write-Host "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Dependencias Python en un venv del proyecto (.venv) cacheado; los
          # steps posteriores invocan .venv\Scripts\python.exe por ruta explícita
          # (PowerShell no tiene el equivalente de $BASH_ENV). En cache hit, pip
          # re-verifica el lock como no-op rápido.
          name: Install runtime deps from universal lock (require-hashes)
          command: |
            Write-Host "[STEP] Install runtime deps from universal lock (require-hashes) - INICIO"
            python --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path .venv)) { python -m venv .venv }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install pip==26.1.2
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install -r requirements-lock.txt --require-hashes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install runtime deps from universal lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - .venv
      - run:
          # La herramienta de build (PyInstaller) se instala DESPUÉS del save_cache,
          # sobre el venv ya poblado: así queda fuera del material cacheado y la
          # caché de venv la comparten test-windows y este build.
          name: Install PyInstaller into venv (post-cache)
          command: |
            Write-Host "[STEP] Install PyInstaller into venv (post-cache) - INICIO"
            .venv\Scripts\python.exe -m pip install pyinstaller==6.21.0
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install PyInstaller into venv (post-cache) - FIN"
      - run:
          # Inno Setup es una herramienta de sistema (no un paquete Python): vive en
          # su propio step, separado de las dependencias Python. Queda fuera del
          # cache: el install de Chocolatey no se cachea de forma confiable en
          # CircleCI.
          name: Install Inno Setup via choco (pinned 6.3.3)
          command: |
            Write-Host "[STEP] Install Inno Setup via choco (pinned 6.3.3) - INICIO"
            choco install innosetup -y --version=6.3.3
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install Inno Setup via choco (pinned 6.3.3) - FIN"
      - run:
          # PyInstaller solo (--no-installer): la etapa Installer corre como step
          # separado (abajo). PyInstaller se lanza vía scripts/pyinstaller_wrapper.py
          # (COINIT_MULTITHREADED + os._exit) para evitar el cuelgue COM del análisis
          # de pycaw/comtypes en el runner headless. no_output_timeout holgado: la
          # compilación tarda 9-15 min con output continuo.
          name: Build Windows x64 onedir via PyInstaller
          no_output_timeout: 20m
          command: |
            Write-Host "[STEP] Build Windows x64 onedir via PyInstaller - INICIO"
            .venv\Scripts\python.exe scripts/build_windows.py --arch x86_64 --no-installer
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Build Windows x64 onedir via PyInstaller - FIN"
      - run:
          # Ejecuta el binario congelado recién construido para detectar
          # empaquetados rotos (metadata faltante, --collect-all incompleto)
          # antes de publicar. `version` no carga el modelo; exit 0 obligatorio.
          name: Smoke test dist/tts-sidecar/tts-sidecar.exe (version + voces de fábrica)
          command: |
            Write-Host "[STEP] Smoke test dist/tts-sidecar/tts-sidecar.exe - INICIO"
            dist/tts-sidecar/tts-sidecar.exe version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            # S3-07: valida que las voces de fábrica (en particular 'default')
            # quedaron empaquetadas en el bundle. `voice list` no carga el
            # modelo; falla el job si el bundle no trae la voz por defecto.
            $voiceList = dist/tts-sidecar/tts-sidecar.exe voice list
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if ($voiceList -notmatch 'default') { throw "La voz de fábrica 'default' no está empaquetada en el bundle" }
            Write-Host "[STEP] Smoke test dist/tts-sidecar/tts-sidecar.exe - FIN"
      - run:
          # Etapa Installer como step separado: invoca directamente al generador,
          # que emite el .iss con compresión lzma/normal (progreso por archivo, no
          # el lzma2/max silencioso >10 min que CircleCI mataba) y hereda la consola
          # para que ese progreso sea el heartbeat. no_output_timeout amplio y
          # chequeo de $LASTEXITCODE: el fallo del installer aborta el job (el
          # instalador es artefacto obligatorio de publish-release; pipelines #29-#30).
          name: Generate Windows x64 installer via Inno Setup
          no_output_timeout: 25m
          command: |
            Write-Host "[STEP] Generate Windows x64 installer via Inno Setup - INICIO"
            .venv\Scripts\python.exe scripts/create_installer_windows.py dist/tts-sidecar
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Generate Windows x64 installer via Inno Setup - FIN"
      - run:
          # Copia única del instalador VERSIONADO (nombre de release, con arch) al
          # directorio de workspace para que `publish-release` lo recolecte sin
          # token de API de CircleCI. Fail-fast (N-01): Copy-Item con wildcard sin
          # match no aborta en PowerShell por defecto — se fuerza el error para que
          # el CI no reporte éxito falso cuando el instalador no se generó.
          name: Stage versioned Windows x64 installer into workspace dir
          command: |
            Write-Host "[STEP] Stage versioned Windows x64 installer into workspace dir - INICIO"
            $ErrorActionPreference = 'Stop'
            New-Item -ItemType Directory -Force -Path artifacts | Out-Null
            if (-not (Test-Path dist/tts-sidecar-*-x86_64-setup.exe)) { throw "Instalador versionado no encontrado en dist/" }
            Copy-Item dist/tts-sidecar-*-x86_64-setup.exe artifacts/
            Write-Host "[STEP] Stage versioned Windows x64 installer into workspace dir - FIN"
      - run:
          # N-04: SHA-256 del artefacto ya staged en artifacts/, en el log del CI;
          # única verificación de integridad posible sin firma de código (R-38).
          name: Emit SHA-256 of staged Windows x64 installer
          command: |
            Write-Host "[STEP] Emit SHA-256 of staged Windows x64 installer - INICIO"
            Get-FileHash artifacts/tts-sidecar-*-x86_64-setup.exe -Algorithm SHA256
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Emit SHA-256 of staged Windows x64 installer - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-x86_64-setup.exe

  build-linux-x64:
    docker:
      # Imagen fijada por digest (R-14): mismo pin que test-linux (ver el
      # comentario de bump allí y docs/BUILD.md §Reproducibilidad).
      - image: cimg/python:3.13@sha256:9d189f873178a2bea234b7d51e31e1ae01a73646e962cf697f757b588f8d77b6
    # resource_class explícito: el bundling de PyInstaller con torch necesita
    # ~8 GB de RAM. En Docker x86 el tier `medium` da solo 4 GB (riesgo de OOM);
    # `large` es el tier más chico que alcanza 8 GB (sus 4 vCPU vienen de regalo,
    # aunque PyInstaller es mayormente single-thread y no los aprovecha). Se
    # declara para no depender del default de cuenta, que podría cambiar a
    # `medium` y romper el build de forma silenciosa. Simetría de RAM con
    # build-linux-arm64, donde `arm.medium` ya trae 8 GB con 2 vCPU.
    resource_class: large
    steps:
      - checkout
      - run:
          name: Install apt build deps (patchelf, libasound2-dev)
          command: |
            echo "[STEP] Install apt build deps (patchelf, libasound2-dev) - INICIO"
            sudo apt-get update
            sudo apt-get install -y patchelf libasound2-dev
            echo "[STEP] Install apt build deps (patchelf, libasound2-dev) - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner (sin pins de herramientas). Al no incluir el pin, la caché de
          # venv es compartida con test-linux (misma plataforma+lockfile CPU-only):
          # el test la puebla, este build acierta HIT.
          name: Compute venv cache key (python --version)
          command: |
            echo "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version > cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
      - run:
          # N-05: lock específico con torch/torchaudio CPU-only (wheels +cpu del
          # índice oficial de PyTorch), sin el stack nvidia-*-cu12 que el índice
          # de PyPI resuelve por defecto en x86_64/linux (~varios GB extra).
          # Solo x86_64 lo necesita: los paquetes nvidia-*-cu12 del lock universal
          # están marcados platform_machine == 'x86_64', por lo que arm64 ya
          # instala sin CUDA desde el lock universal. Las dependencias viven en
          # un venv cacheado: en cache hit, pip re-verifica el lock como no-op.
          name: Install runtime deps from CPU-only lock (require-hashes)
          command: |
            echo "[STEP] Install runtime deps from CPU-only lock (require-hashes) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            pip install pip==26.1.2
            pip install -r requirements-lock-linux-cpu.txt --require-hashes --extra-index-url https://download.pytorch.org/whl/cpu
            echo "[STEP] Install runtime deps from CPU-only lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
          paths:
            - ~/.venv
      - run:
          # La herramienta de build (PyInstaller) se instala DESPUÉS del save_cache,
          # sobre el venv ya poblado: así queda fuera del material cacheado y la
          # caché de venv la comparten test-linux y este build.
          name: Install PyInstaller into venv (post-cache)
          command: |
            echo "[STEP] Install PyInstaller into venv (post-cache) - INICIO"
            pip install pyinstaller==6.21.0
            echo "[STEP] Install PyInstaller into venv (post-cache) - FIN"
      - run:
          name: Build Linux x64 AppImage via PyInstaller
          no_output_timeout: 20m
          command: |
            echo "[STEP] Build Linux x64 AppImage via PyInstaller - INICIO"
            python scripts/build_linux.py --arch x86_64
            echo "[STEP] Build Linux x64 AppImage via PyInstaller - FIN"
      - run:
          # Ejecuta el binario congelado onedir para detectar empaquetados rotos
          # antes de publicar. `version` no carga el modelo; exit 0 obligatorio.
          name: Smoke test dist/tts-sidecar/tts-sidecar (version + voces de fábrica)
          command: |
            echo "[STEP] Smoke test dist/tts-sidecar/tts-sidecar - INICIO"
            dist/tts-sidecar/tts-sidecar version
            # S3-07: valida que las voces de fábrica (en particular 'default')
            # quedaron empaquetadas en el bundle. `voice list` no carga el
            # modelo; el grep -qx aborta el step si 'default' no viaja en el bundle.
            dist/tts-sidecar/tts-sidecar voice list | grep -qx '  - default'
            echo "[STEP] Smoke test dist/tts-sidecar/tts-sidecar - FIN"
      - run:
          # Copia única del AppImage VERSIONADO (nombre de release, con arch) al
          # directorio de workspace para `publish-release`. Fail-fast: sin match,
          # el glob se pasa literal a cp → error → el step aborta (bash -eo pipefail).
          name: Stage versioned Linux x64 AppImage into workspace dir
          command: |
            echo "[STEP] Stage versioned Linux x64 AppImage into workspace dir - INICIO"
            mkdir -p artifacts
            cp dist/tts-sidecar-*-x86_64.AppImage artifacts/
            echo "[STEP] Stage versioned Linux x64 AppImage into workspace dir - FIN"
      - run:
          # N-04: SHA-256 del artefacto ya staged en artifacts/, en el log del CI;
          # única verificación de integridad posible sin firma de código (R-38).
          name: Emit SHA-256 of staged Linux x64 AppImage
          command: |
            echo "[STEP] Emit SHA-256 of staged Linux x64 AppImage - INICIO"
            sha256sum artifacts/tts-sidecar-*-x86_64.AppImage
            echo "[STEP] Emit SHA-256 of staged Linux x64 AppImage - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-x86_64.AppImage

