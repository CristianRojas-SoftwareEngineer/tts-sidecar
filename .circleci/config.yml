version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  test-linux:
    # El executor es x86_64 (Docker, el más barato/rápido disponible): la suite
    # es arch-independiente y mockea el engine (torch/onnxruntime no se ejercitan),
    # así que no hay señal adicional en re-correrla en ARM64. Justificación
    # completa (simetría 3 tests / 4 builds) en docs/BUILD.md §4.
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            echo "[STEP] Install system dependencies - INICIO"
            sudo apt-get update
            sudo apt-get install -y libasound2-dev
            echo "[STEP] Install system dependencies - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner + pins de herramientas fuera del lockfile. Un cambio en
          # cualquiera invalida el cache automáticamente.
          name: Compute cache key
          command: |
            echo "[STEP] Compute cache key - INICIO"
            python --version > cache-key.txt
            echo "pytest==9.1.1" >> cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
      - run:
          # Instalación reproducible desde el lock CPU-only con hashes
          # (--require-hashes rechaza cualquier paquete sin hash o no fijado).
          # Se usa el lock CPU (no el universal): la suite mockea el engine
          # (torch no se ejercita) y el build de esta misma plataforma
          # (build-linux-x64) ya instala exactamente este lock, así que el
          # stack nvidia-*-cu12 del lock universal solo agregaría varios GB
          # sin señal adicional. Las dependencias viven en un venv cacheado:
          # en cache hit, pip re-verifica el lock como no-op rápido.
          name: Install runtime dependencies (locked, CPU-only)
          command: |
            echo "[STEP] Install runtime dependencies (locked, CPU-only) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            pip install -r requirements-lock-linux-cpu.txt --require-hashes --extra-index-url https://download.pytorch.org/whl/cpu
            echo "[STEP] Install runtime dependencies (locked, CPU-only) - FIN"
      - run:
          name: Install pytest
          command: |
            echo "[STEP] Install pytest - INICIO"
            pip install pytest==9.1.1
            echo "[STEP] Install pytest - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
          paths:
            - ~/.venv
      - run:
          # WARNING-04: CLAUDE.md documenta py_compile como chequeo de verificación,
          # pero no corría en CI; compileall detecta errores de sintaxis en módulos
          # sin tests propios o importados condicionalmente, antes del build.
          name: Check syntax (py_compile)
          command: |
            echo "[STEP] Check syntax (py_compile) - INICIO"
            python -m compileall src/
            echo "[STEP] Check syntax (py_compile) - FIN"
      - run:
          name: Run tests
          command: |
            echo "[STEP] Run tests - INICIO"
            pytest tests/ -v
            echo "[STEP] Run tests - FIN"

  test-windows:
    # R-22: la suite corría solo en Linux; todo el código específico de Windows
    # (pycaw/COM, winsound, generación del .iss) se ejercitaba solo con mocks.
    # Este job corre la suite completa en Windows nativo y actúa como puerta de
    # los builds junto a `test-linux` y `test-macos` (triple puerta simétrica).
    executor: win/server-2022
    steps:
      - checkout
      - run:
          # Pin de Chocolatey (espejo de build-windows-x64): un release nuevo no debe
          # romper el job sin cambios en el repo.
          name: Install Python 3.13
          command: |
            Write-Host "[STEP] Install Python 3.13 - INICIO"
            choco install python313 -y --version=3.13.14
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install Python 3.13 - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner + pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            Write-Host "[STEP] Compute cache key - INICIO"
            python --version | Out-File -Encoding ascii cache-key.txt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Add-Content -Encoding ascii cache-key.txt "pytest==9.1.1"
            Get-Content cache-key.txt
            Write-Host "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Dependencias en un venv del proyecto (.venv) cacheado. PowerShell no
          # tiene el equivalente de $BASH_ENV para activar el venv entre steps:
          # los steps posteriores invocan .venv\Scripts\python.exe por ruta
          # explícita. En cache hit, pip re-verifica el lock como no-op rápido.
          name: Install runtime dependencies (locked)
          command: |
            Write-Host "[STEP] Install runtime dependencies (locked) - INICIO"
            python --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path .venv)) { python -m venv .venv }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install --upgrade pip
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install -r requirements-lock.txt --require-hashes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install runtime dependencies (locked) - FIN"
      - run:
          name: Install pytest
          command: |
            Write-Host "[STEP] Install pytest - INICIO"
            .venv\Scripts\python.exe -m pip install pytest==9.1.1
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install pytest - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - .venv
      - run:
          name: Run tests
          command: |
            Write-Host "[STEP] Run tests - INICIO"
            .venv\Scripts\python.exe -m pytest tests/ -v
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Run tests - FIN"

  test-macos:
    # Equivalencia de cobertura con test-linux/test-windows: sin un Mac físico
    # disponible, el gate en CI es la única validación de la plataforma macOS
    # (playback vía afplay/sounddevice, rutas y señales POSIX del user-data-dir)
    # antes de que un usuario real la pruebe. Corre la suite completa en macOS
    # nativo y actúa como puerta de los builds (triple puerta simétrica).
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - pyenv-v1-{{ arch }}-3.13.14-xcode26.4
      - run:
          # Pin EXACTO de Python 3.13.14 vía pyenv (espejo del pin de Chocolatey
          # en los jobs Windows): no usar el python3 del sistema sin fijar, para
          # testear sobre la misma versión que empaqueta el build, y con patch
          # fijo para que la clave de cache del CPython compilado sea estable.
          # no_output_timeout holgado: pyenv compila CPython desde fuente con
          # output escaso (~10 min) en el primer miss; con cache restaurado,
          # `pyenv install -s` salta la compilación en segundos. La clave del
          # cache incluye la versión de Xcode: el CPython compilado depende del
          # SDK del runner. `brew upgrade pyenv` es obligatorio antes de fijar
          # un patch exacto: el pyenv preinstalado en la imagen puede no traer
          # localmente la definición del patch más reciente (python-build es
          # un snapshot vendido con el formula de Homebrew, no se actualiza solo).
          name: Set up Python 3.13
          no_output_timeout: 20m
          command: |
            echo "[STEP] Set up Python 3.13 - INICIO"
            brew update && brew upgrade pyenv
            pyenv install -s 3.13.14
            pyenv global 3.13.14
            pyenv rehash
            python --version
            echo "[STEP] Set up Python 3.13 - FIN"
      - save_cache:
          key: pyenv-v1-{{ arch }}-3.13.14-xcode26.4
          paths:
            - ~/.pyenv/versions
      - run:
          # Material de la clave de cache del venv: versión exacta de Python +
          # pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            echo "[STEP] Compute cache key - INICIO"
            python --version > cache-key.txt
            echo "pytest==9.1.1" >> cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Instalación reproducible desde el lock universal con hashes, en un
          # venv cacheado: en cache hit, pip re-verifica el lock como no-op.
          name: Install runtime dependencies (locked)
          command: |
            echo "[STEP] Install runtime dependencies (locked) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements-lock.txt --require-hashes
            echo "[STEP] Install runtime dependencies (locked) - FIN"
      - run:
          name: Install pytest
          command: |
            echo "[STEP] Install pytest - INICIO"
            python -m pip install pytest==9.1.1
            echo "[STEP] Install pytest - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - ~/.venv
      - run:
          name: Run tests
          command: |
            echo "[STEP] Run tests - INICIO"
            python -m pytest tests/ -v
            echo "[STEP] Run tests - FIN"

  build-windows-x64:
    executor: win/server-2022
    steps:
      - checkout
      - run:
          # SUGGESTION-06: sin pin, un release nuevo de Chocolatey puede romper
          # el build sin cambios en el repo. Versión fijada al momento de escribir
          # este pin; actualizar deliberadamente cuando se quiera adoptar una nueva.
          name: Install Python 3.13
          command: |
            Write-Host "[STEP] Install Python 3.13 - INICIO"
            choco install python313 -y --version=3.13.14
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install Python 3.13 - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner + pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            Write-Host "[STEP] Compute cache key - INICIO"
            python --version | Out-File -Encoding ascii cache-key.txt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Add-Content -Encoding ascii cache-key.txt "pyinstaller==6.21.0"
            Get-Content cache-key.txt
            Write-Host "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Dependencias Python en un venv del proyecto (.venv) cacheado; los
          # steps posteriores invocan .venv\Scripts\python.exe por ruta explícita
          # (PowerShell no tiene el equivalente de $BASH_ENV). Inno Setup queda
          # fuera del cache: el install de Chocolatey no se cachea de forma
          # confiable en CircleCI.
          name: Install dependencies
          command: |
            Write-Host "[STEP] Install dependencies - INICIO"
            python --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path .venv)) { python -m venv .venv }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install --upgrade pip
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install -r requirements-lock.txt --require-hashes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .venv\Scripts\python.exe -m pip install pyinstaller==6.21.0
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            choco install innosetup -y --version=6.3.3
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Install dependencies - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - .venv
      - run:
          # PyInstaller solo (--no-installer): la etapa Installer corre como step
          # separado (abajo). PyInstaller se lanza vía scripts/pyinstaller_wrapper.py
          # (COINIT_MULTITHREADED + os._exit) para evitar el cuelgue COM del análisis
          # de pycaw/comtypes en el runner headless. no_output_timeout holgado: la
          # compilación tarda 9-15 min con output continuo.
          name: Build Windows (PyInstaller onedir)
          no_output_timeout: 20m
          command: |
            Write-Host "[STEP] Build Windows (PyInstaller onedir) - INICIO"
            .venv\Scripts\python.exe scripts/build_windows.py --arch x86_64 --no-installer
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Build Windows (PyInstaller onedir) - FIN"
      - run:
          # Ejecuta el binario congelado recién construido para detectar
          # empaquetados rotos (metadata faltante, --collect-all incompleto)
          # antes de publicar. `version` no carga el modelo; exit 0 obligatorio.
          name: Smoke test frozen binary
          command: |
            Write-Host "[STEP] Smoke test frozen binary - INICIO"
            dist/tts-sidecar/tts-sidecar.exe version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Smoke test frozen binary - FIN"
      - run:
          # Etapa Installer como step separado: invoca directamente al generador,
          # que emite el .iss con compresión lzma/normal (progreso por archivo, no
          # el lzma2/max silencioso >10 min que CircleCI mataba) y hereda la consola
          # para que ese progreso sea el heartbeat. no_output_timeout amplio y
          # chequeo de $LASTEXITCODE: el fallo del installer aborta el job (el
          # instalador es artefacto obligatorio de publish-release; pipelines #29-#30).
          name: Generate installer
          no_output_timeout: 25m
          command: |
            Write-Host "[STEP] Generate installer - INICIO"
            .venv\Scripts\python.exe scripts/create_installer_windows.py dist/tts-sidecar
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Generate installer - FIN"
      - run:
          # store_artifacts no expande globs: se copia el instalador (cuyo nombre
          # incluye la versión) a un nombre estable, independiente de __version__.
          # N-01: Copy-Item con wildcard sin match no aborta en PowerShell por
          # defecto (WARNING no fatal) — se fuerza el error para que el CI no
          # reporte éxito falso cuando el instalador no se generó.
          name: Stage installer artifact
          command: |
            Write-Host "[STEP] Stage installer artifact - INICIO"
            $ErrorActionPreference = 'Stop'
            if (-not (Test-Path dist/tts-sidecar-*-x86_64-setup.exe)) { throw "Instalador no encontrado en dist/" }
            Copy-Item dist/tts-sidecar-*-x86_64-setup.exe dist/tts-sidecar-x86_64-setup.exe
            Write-Host "[STEP] Stage installer artifact - FIN"
      - run:
          # N-04: SHA-256 del artefacto en el log del CI, única verificación de
          # integridad posible sin firma de código (R-38).
          name: Emit artifact SHA-256
          command: |
            Write-Host "[STEP] Emit artifact SHA-256 - INICIO"
            Get-FileHash dist/tts-sidecar-x86_64-setup.exe -Algorithm SHA256
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "[STEP] Emit artifact SHA-256 - FIN"
      - run:
          # Persiste el instalador VERSIONADO (nombre de release, con arch) al
          # workspace para que `publish-release` lo recolecte sin token de API de
          # CircleCI. Mismo fail-fast que el staging (N-01): Copy-Item con wildcard
          # sin match no aborta en PowerShell por defecto.
          name: Persist installer to workspace
          command: |
            Write-Host "[STEP] Persist installer to workspace - INICIO"
            $ErrorActionPreference = 'Stop'
            New-Item -ItemType Directory -Force -Path artifacts | Out-Null
            if (-not (Test-Path dist/tts-sidecar-*-x86_64-setup.exe)) { throw "Instalador versionado no encontrado en dist/" }
            Copy-Item dist/tts-sidecar-*-x86_64-setup.exe artifacts/
            Write-Host "[STEP] Persist installer to workspace - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-x86_64-setup.exe
      - store_artifacts:
          path: dist/tts-sidecar-x86_64-setup.exe
          destination: tts-sidecar-win32-x86_64-setup.exe
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-win32-x86_64/

  build-linux-x64:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            echo "[STEP] Install system dependencies - INICIO"
            sudo apt-get update
            sudo apt-get install -y patchelf libasound2-dev
            echo "[STEP] Install system dependencies - FIN"
      - run:
          # Material de la clave de cache del venv: versión exacta de Python del
          # runner + pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            echo "[STEP] Compute cache key - INICIO"
            python --version > cache-key.txt
            echo "pyinstaller==6.21.0" >> cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
      - run:
          # N-05: lock específico con torch/torchaudio CPU-only (wheels +cpu del
          # índice oficial de PyTorch), sin el stack nvidia-*-cu12 que el índice
          # de PyPI resuelve por defecto en x86_64/linux (~varios GB extra).
          # Solo x86_64 lo necesita: los paquetes nvidia-*-cu12 del lock universal
          # están marcados platform_machine == 'x86_64', por lo que arm64 ya
          # instala sin CUDA desde el lock universal. Las dependencias viven en
          # un venv cacheado: en cache hit, pip re-verifica el lock como no-op.
          name: Install runtime dependencies (locked, CPU-only)
          command: |
            echo "[STEP] Install runtime dependencies (locked, CPU-only) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            pip install -r requirements-lock-linux-cpu.txt --require-hashes --extra-index-url https://download.pytorch.org/whl/cpu
            echo "[STEP] Install runtime dependencies (locked, CPU-only) - FIN"
      - run:
          name: Install PyInstaller
          command: |
            echo "[STEP] Install PyInstaller - INICIO"
            pip install pyinstaller==6.21.0
            echo "[STEP] Install PyInstaller - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock-linux-cpu.txt" }}
          paths:
            - ~/.venv
      - run:
          name: Build Linux x64
          no_output_timeout: 20m
          command: |
            echo "[STEP] Build Linux x64 - INICIO"
            python scripts/build_linux.py --arch x86_64
            echo "[STEP] Build Linux x64 - FIN"
      - run:
          # Ejecuta el binario congelado onedir para detectar empaquetados rotos
          # antes de publicar. `version` no carga el modelo; exit 0 obligatorio.
          name: Smoke test frozen binary
          command: |
            echo "[STEP] Smoke test frozen binary - INICIO"
            dist/tts-sidecar/tts-sidecar version
            echo "[STEP] Smoke test frozen binary - FIN"
      - run:
          # store_artifacts no expande globs: se copia el AppImage (cuyo nombre
          # incluye la versión) a un nombre estable, independiente de __version__.
          name: Stage AppImage artifact
          command: |
            echo "[STEP] Stage AppImage artifact - INICIO"
            cp dist/tts-sidecar-*-x86_64.AppImage dist/tts-sidecar-x86_64.AppImage
            echo "[STEP] Stage AppImage artifact - FIN"
      - run:
          # N-04: SHA-256 del artefacto en el log del CI, única verificación de
          # integridad posible sin firma de código (R-38).
          name: Emit artifact SHA-256
          command: |
            echo "[STEP] Emit artifact SHA-256 - INICIO"
            sha256sum dist/tts-sidecar-x86_64.AppImage
            echo "[STEP] Emit artifact SHA-256 - FIN"
      - run:
          # Persiste el AppImage VERSIONADO (nombre de release, con arch) al
          # workspace para `publish-release`. Fail-fast: sin match, el glob se
          # pasa literal a cp → error → el step aborta (bash -eo pipefail).
          name: Persist AppImage to workspace
          command: |
            echo "[STEP] Persist AppImage to workspace - INICIO"
            mkdir -p artifacts
            cp dist/tts-sidecar-*-x86_64.AppImage artifacts/
            echo "[STEP] Persist AppImage to workspace - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-x86_64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar-x86_64.AppImage
          destination: tts-sidecar-linux-x86_64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-linux-x86_64/

  build-linux-arm64:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            echo "[STEP] Install system dependencies - INICIO"
            sudo apt-get update
            sudo apt-get install -y patchelf libasound2-dev
            echo "[STEP] Install system dependencies - FIN"
      - restore_cache:
          keys:
            - pyenv-v1-{{ arch }}-3.13.14
      - run:
          # Pin EXACTO de Python 3.13.14 (espejo del pin de Chocolatey en los
          # jobs Windows): patch fijo para que la clave de cache del CPython
          # compilado sea estable. no_output_timeout holgado: pyenv compila
          # CPython desde fuente con output escaso (~10 min) en el primer miss;
          # con cache restaurado, `pyenv install -s` salta la compilación. Si
          # `~/.pyenv` es un checkout git (instalación estándar del pyenv-installer
          # en las imágenes `machine` de CircleCI), se actualiza antes de instalar:
          # la definición de un patch recién liberado puede no estar en el
          # snapshot vendido con la imagen.
          name: Set up Python 3.13
          no_output_timeout: 20m
          command: |
            echo "[STEP] Set up Python 3.13 - INICIO"
            if [ -d "$(pyenv root)/.git" ]; then git -C "$(pyenv root)" pull --ff-only; fi
            pyenv install -s 3.13.14
            pyenv global 3.13.14
            pyenv rehash
            python --version
            echo "[STEP] Set up Python 3.13 - FIN"
      - save_cache:
          key: pyenv-v1-{{ arch }}-3.13.14
          paths:
            - ~/.pyenv/versions
      - run:
          # Material de la clave de cache del venv: versión exacta de Python +
          # pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            echo "[STEP] Compute cache key - INICIO"
            python --version > cache-key.txt
            echo "pyinstaller==6.21.0" >> cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Lock universal en venv cacheado: en cache hit, pip re-verifica el
          # lock como no-op rápido.
          name: Install dependencies
          command: |
            echo "[STEP] Install dependencies - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements-lock.txt --require-hashes
            python -m pip install pyinstaller==6.21.0
            echo "[STEP] Install dependencies - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - ~/.venv
      - run:
          name: Build Linux ARM64
          no_output_timeout: 20m
          command: |
            echo "[STEP] Build Linux ARM64 - INICIO"
            python scripts/build_linux.py --arch arm64
            echo "[STEP] Build Linux ARM64 - FIN"
      - run:
          # Ejecuta el binario congelado onedir para detectar empaquetados rotos
          # antes de publicar. `version` no carga el modelo; exit 0 obligatorio.
          # Gate de facto de ARM64: no hay un `test-linux-arm64` (la suite mockea
          # el engine, ver test-linux), así que este smoke test es la única puerta
          # que ejercita el stack nativo aarch64 (wheels, extensiones). Decisión
          # documentada en docs/BUILD.md §4.
          name: Smoke test frozen binary
          command: |
            echo "[STEP] Smoke test frozen binary - INICIO"
            dist/tts-sidecar/tts-sidecar version
            echo "[STEP] Smoke test frozen binary - FIN"
      - run:
          # store_artifacts no expande globs: se copia el AppImage (cuyo nombre
          # incluye la versión) a un nombre estable, independiente de __version__.
          name: Stage AppImage artifact
          command: |
            echo "[STEP] Stage AppImage artifact - INICIO"
            cp dist/tts-sidecar-*-aarch64.AppImage dist/tts-sidecar-aarch64.AppImage
            echo "[STEP] Stage AppImage artifact - FIN"
      - run:
          # N-04: SHA-256 del artefacto en el log del CI, única verificación de
          # integridad posible sin firma de código (R-38).
          name: Emit artifact SHA-256
          command: |
            echo "[STEP] Emit artifact SHA-256 - INICIO"
            sha256sum dist/tts-sidecar-aarch64.AppImage
            echo "[STEP] Emit artifact SHA-256 - FIN"
      - run:
          # Persiste el AppImage VERSIONADO (nombre de release, con arch) al
          # workspace para `publish-release`. Fail-fast: sin match, el glob se
          # pasa literal a cp → error → el step aborta (bash -eo pipefail).
          name: Persist AppImage to workspace
          command: |
            echo "[STEP] Persist AppImage to workspace - INICIO"
            mkdir -p artifacts
            cp dist/tts-sidecar-*-aarch64.AppImage artifacts/
            echo "[STEP] Persist AppImage to workspace - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-aarch64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar-aarch64.AppImage
          destination: tts-sidecar-linux-aarch64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-linux-aarch64/

  build-darwin-arm64:
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - pyenv-v1-{{ arch }}-3.13.14-xcode26.4
      - run:
          # Pin EXACTO de Python 3.13.14 vía pyenv (espejo del job
          # build-linux-arm64 y del pin de Chocolatey): el runner de macOS no
          # debe usar su python3 del sistema sin fijar, o el build empaquetaría
          # una versión no controlada; patch fijo para que la clave de cache del
          # CPython compilado sea estable. no_output_timeout holgado: pyenv
          # compila CPython desde fuente con output escaso (~10 min) en el
          # primer miss; con cache restaurado, `pyenv install -s` salta la
          # compilación. La clave del cache incluye la versión de Xcode: el
          # CPython compilado depende del SDK del runner. `brew upgrade pyenv`
          # es obligatorio antes de fijar un patch exacto: el pyenv preinstalado
          # en la imagen puede no traer localmente la definición del patch más
          # reciente (python-build es un snapshot vendido con el formula de
          # Homebrew, no se actualiza solo).
          name: Set up Python 3.13
          no_output_timeout: 20m
          command: |
            echo "[STEP] Set up Python 3.13 - INICIO"
            brew update && brew upgrade pyenv
            pyenv install -s 3.13.14
            pyenv global 3.13.14
            pyenv rehash
            python --version
            echo "[STEP] Set up Python 3.13 - FIN"
      - save_cache:
          key: pyenv-v1-{{ arch }}-3.13.14-xcode26.4
          paths:
            - ~/.pyenv/versions
      - run:
          # Material de la clave de cache del venv: versión exacta de Python +
          # pins de herramientas fuera del lockfile.
          name: Compute cache key
          command: |
            echo "[STEP] Compute cache key - INICIO"
            python --version > cache-key.txt
            echo "pyinstaller==6.21.0" >> cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute cache key - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Lock universal en venv cacheado: en cache hit, pip re-verifica el
          # lock como no-op rápido.
          name: Install runtime dependencies (locked)
          command: |
            echo "[STEP] Install runtime dependencies (locked) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements-lock.txt --require-hashes
            echo "[STEP] Install runtime dependencies (locked) - FIN"
      - run:
          name: Install PyInstaller
          command: |
            echo "[STEP] Install PyInstaller - INICIO"
            python -m pip install pyinstaller==6.21.0
            echo "[STEP] Install PyInstaller - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - ~/.venv
      - run:
          # create-dmg es un script de shell distribuido por Homebrew, no un
          # paquete de PyPI: `pip3 install create-dmg` fallaba siempre
          # (con o sin pin), independientemente de esta auditoría. Homebrew
          # no soporta fijar una versión exacta de forma simple (a diferencia
          # de pip), así que se deja sin pin explícito; y como no se pinea,
          # el `brew update` implícito (minutos de wall-time) tampoco aporta:
          # HOMEBREW_NO_AUTO_UPDATE=1 lo suprime.
          name: Install create-dmg (Homebrew)
          command: |
            echo "[STEP] Install create-dmg (Homebrew) - INICIO"
            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
            echo "[STEP] Install create-dmg (Homebrew) - FIN"
      - run:
          name: Build macOS arm64
          no_output_timeout: 20m
          command: |
            echo "[STEP] Build macOS arm64 - INICIO"
            python3 scripts/build_macos.py --arch arm64
            echo "[STEP] Build macOS arm64 - FIN"
      - run:
          # Ejecuta el binario congelado dentro del .app para detectar
          # empaquetados rotos antes de publicar. `version` no carga el modelo;
          # exit 0 obligatorio.
          name: Smoke test frozen binary
          command: |
            echo "[STEP] Smoke test frozen binary - INICIO"
            dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar version
            echo "[STEP] Smoke test frozen binary - FIN"
      - run:
          # store_artifacts no expande globs: se copia el .dmg (cuyo nombre
          # incluye la versión) a un nombre estable, independiente de __version__.
          name: Stage DMG artifact
          command: |
            echo "[STEP] Stage DMG artifact - INICIO"
            cp dist/tts-sidecar-*-arm64.dmg dist/tts-sidecar-arm64.dmg
            echo "[STEP] Stage DMG artifact - FIN"
      - run:
          # N-04: SHA-256 del artefacto en el log del CI, única verificación de
          # integridad posible sin firma de código (R-38).
          name: Emit artifact SHA-256
          command: |
            echo "[STEP] Emit artifact SHA-256 - INICIO"
            shasum -a 256 dist/tts-sidecar-arm64.dmg
            echo "[STEP] Emit artifact SHA-256 - FIN"
      - run:
          # Persiste el .dmg VERSIONADO (nombre de release, con arch) al
          # workspace para `publish-release`. Fail-fast: sin match, el glob se
          # pasa literal a cp → error → el step aborta (bash -eo pipefail).
          name: Persist DMG to workspace
          command: |
            echo "[STEP] Persist DMG to workspace - INICIO"
            mkdir -p artifacts
            cp dist/tts-sidecar-*-arm64.dmg artifacts/
            echo "[STEP] Persist DMG to workspace - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-arm64.dmg
      - store_artifacts:
          path: dist/tts-sidecar-arm64.dmg
          destination: tts-sidecar-darwin-arm64.dmg
      - store_artifacts:
          path: dist/tts-sidecar-arm64.app
          destination: tts-sidecar-darwin-arm64.app/

  publish-release:
    # CD estrategia 1 (GitHub Releases). Solo corre en tags `v*` (ver el
    # workflow). Recolecta los 4 artefactos VERSIONADOS por workspace (no
    # `gh run download`: determinista, sin token de API de CircleCI), genera
    # SHA256SUMS.txt y crea un GitHub Release en BORRADOR con notas del
    # CHANGELOG. El humano revisa el draft y pulsa «publish». Requiere el
    # context `github-release` con GH_TOKEN (fine-grained PAT, contents:write).
    docker:
      - image: cimg/base:current
    steps:
      - checkout                       # para CHANGELOG.md y el cotejo de notas
      - attach_workspace:
          at: artifacts
      - run:
          # gh CLI desde el repo apt oficial de GitHub (pineado por su propia
          # firma GPG); no viene preinstalado en cimg/base.
          name: Install gh CLI
          command: |
            echo "[STEP] Install gh CLI - INICIO"
            set -euo pipefail
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh
            echo "[STEP] Install gh CLI - FIN"
      - run:
          # Los 4 artefactos ya llegan con su nombre de release (versionado, con
          # arch); solo falta el manifiesto de checksums. Fail-fast: sin los 4
          # artefactos en el workspace, sha256sum falla y el step aborta.
          name: Generate SHA256SUMS.txt
          command: |
            echo "[STEP] Generate SHA256SUMS.txt - INICIO"
            set -euo pipefail
            cd artifacts
            sha256sum tts-sidecar-* > SHA256SUMS.txt
            cat SHA256SUMS.txt
            echo "[STEP] Generate SHA256SUMS.txt - FIN"
      - run:
          # Extrae la sección `## [X.Y.Z]` del CHANGELOG (X.Y.Z = tag sin la `v`)
          # hasta el siguiente `## [`. Fail-fast si la sección no existe: evita
          # publicar un Release con notas vacías.
          name: Extract release notes
          command: |
            echo "[STEP] Extract release notes - INICIO"
            set -euo pipefail
            VERSION="${CIRCLE_TAG#v}"
            # Corta en el siguiente `## [` (próxima versión) o en el bloque de
            # referencias de enlaces del pie (`[label]: url`), que sigue a la
            # última sección y no debe filtrarse a las notas.
            awk -v ver="## [$VERSION]" '
              index($0, ver) == 1 { grab=1; print; next }
              grab && /^## \[/ { exit }
              grab && /^\[[^][]*\]:/ { exit }
              grab { print }
            ' CHANGELOG.md > notes.md
            if [ ! -s notes.md ]; then
              echo "ERROR: no se encontró la sección [$VERSION] en CHANGELOG.md" >&2
              exit 1
            fi
            cat notes.md
            echo "[STEP] Extract release notes - FIN"
      - run:
          # Crea el Release en BORRADOR con los 5 assets (4 artefactos +
          # SHA256SUMS.txt). Si el tag ya tiene Release, `gh release create`
          # falla ruidosamente (correcto: no re-publica en silencio).
          name: Create draft GitHub Release
          command: |
            echo "[STEP] Create draft GitHub Release - INICIO"
            set -euo pipefail
            gh release create "$CIRCLE_TAG" \
              artifacts/tts-sidecar-* artifacts/SHA256SUMS.txt \
              --draft \
              --title "$CIRCLE_TAG" \
              --notes-file notes.md
            echo "[STEP] Create draft GitHub Release - FIN"

workflows:
  build-all:
    # CircleCI NO ejecuta un job en un tag salvo que el job Y todas sus
    # dependencias declaren `filters.tags`; por eso el filtro `tags: only /^v.*/`
    # se propaga por toda la cadena (tests → builds → publish-release). Todos
    # los jobs declaran además `branches: ignore /.*/`: el pipeline completo
    # corre SOLO en tags `v*`, nunca en pushes de rama.
    jobs:
      - test-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-macos:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-windows-x64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
      - build-linux-x64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
      - build-linux-arm64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
      - build-darwin-arm64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
      - publish-release:
          context:
            - github-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - build-windows-x64
            - build-linux-x64
            - build-linux-arm64
            - build-darwin-arm64
