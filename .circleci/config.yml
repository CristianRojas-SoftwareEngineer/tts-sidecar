version: 2.1

orbs:
  python: circleci/python@2.1.1
  windows: circleci/windows@5.0

jobs:
  test:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y libasound2-dev
      - python/install-packages:
          package-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install pytest
          command: pip install pytest
      - run:
          name: Run tests
          command: pytest tests/ -v

  build-windows:
    executor: win/server-2022
    steps:
      - checkout
      - run:
          name: Install Python 3.13
          command: choco install python313 -y
      - run:
          name: Install dependencies
          command: |
            python --version
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pyinstaller
            choco install innosetup -y
      - run:
          name: Build Windows
          command: python scripts/build_windows.py
      - run:
          # store_artifacts no expande globs: se copia el instalador (cuyo nombre
          # incluye la versión) a un nombre estable, independiente de __version__.
          name: Stage installer artifact
          command: Copy-Item dist/tts-sidecar-*-setup.exe dist/tts-sidecar-setup.exe
      - store_artifacts:
          path: dist/tts-sidecar-setup.exe
          destination: tts-sidecar-win32-x64-setup.exe
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-win32-x64/

  build-linux-x64:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y patchelf libasound2-dev
      - python/install-packages:
          package-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install PyInstaller and appimage-builder
          command: |
            pip install pyinstaller appimage-builder
      - run:
          name: Build Linux x64
          command: python scripts/build_linux.py --arch x86_64
      - store_artifacts:
          path: dist/tts-sidecar-x86_64.AppImage
          destination: tts-sidecar-linux-x86_64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-linux-x86_64/

  build-linux-arm64:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y patchelf libasound2-dev
      - run:
          name: Set up Python 3.13
          command: |
            pyenv install -s 3.13
            pyenv global 3.13
            python --version
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pyinstaller appimage-builder
      - run:
          name: Build Linux ARM64
          command: python scripts/build_linux.py --arch arm64
      - store_artifacts:
          path: dist/tts-sidecar-aarch64.AppImage
          destination: tts-sidecar-linux-arm64.AppImage
      - store_artifacts:
          path: dist/tts-sidecar
          destination: tts-sidecar-linux-arm64/

  build-darwin-universal2:
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Set up Python
          command: |
            python3 --version
            python3 -m pip install --upgrade pip
            pip3 install -r requirements.txt
      - run:
          name: Install PyInstaller and create-dmg
          command: |
            pip3 install pyinstaller create-dmg
      - run:
          name: Build macOS universal2
          command: python3 scripts/build_macos.py --arch universal2
      - store_artifacts:
          path: dist/tts-sidecar-universal2.dmg
          destination: tts-sidecar-darwin-universal2.dmg
      - store_artifacts:
          path: dist/tts-sidecar-universal2.app
          destination: tts-sidecar-darwin-universal2.app/

workflows:
  build-all:
    jobs:
      - test
      - build-windows:
          requires:
            - test
      - build-linux-x64:
          requires:
            - test
      - build-linux-arm64:
          requires:
            - test
      - build-darwin-universal2:
          requires:
            - test
