  build-darwin-arm64:
    macos:
      xcode: "26.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - pyenv-v1-{{ arch }}-3.13.14-xcode26.4
      - run:
          # Pin EXACTO de Python 3.13.14 vía pyenv (espejo del job
          # build-linux-arm64 y del pin de Chocolatey): el runner de macOS no
          # debe usar su python3 del sistema sin fijar, o el build empaquetaría
          # una versión no controlada; patch fijo para que la clave de cache del
          # CPython compilado sea estable. no_output_timeout holgado: pyenv
          # compila CPython desde fuente con output escaso (~10 min) en el
          # primer miss; con cache restaurado, `pyenv install -s` salta la
          # compilación. La clave del cache incluye la versión de Xcode: el
          # CPython compilado depende del SDK del runner. `brew upgrade pyenv`
          # es obligatorio antes de fijar un patch exacto: el pyenv preinstalado
          # en la imagen puede no traer localmente la definición del patch más
          # reciente (python-build es un snapshot vendido con el formula de
          # Homebrew, no se actualiza solo). Excepción consciente de pin (R-14):
          # Homebrew no soporta fijar una versión de pyenv, y la versión de
          # pyenv no altera el artefacto — el CPython resultante ya está
          # pineado (3.13.14).
          name: Set up Python 3.13 via pyenv (pinned 3.13.14)
          no_output_timeout: 20m
          command: |
            echo "[STEP] Set up Python 3.13 via pyenv (pinned 3.13.14) - INICIO"
            brew update && brew upgrade pyenv
            pyenv install -s 3.13.14
            pyenv global 3.13.14
            pyenv rehash
            python --version
            echo "[STEP] Set up Python 3.13 via pyenv (pinned 3.13.14) - FIN"
      - save_cache:
          key: pyenv-v1-{{ arch }}-3.13.14-xcode26.4
          paths:
            - ~/.pyenv/versions
      - run:
          # Material de la clave de cache del venv: versión exacta de Python (sin
          # pins de herramientas). Al no incluir el pin, la caché de venv es
          # compartida con test-macos: el test la puebla, este build acierta HIT.
          name: Compute venv cache key (python --version)
          command: |
            echo "[STEP] Compute venv cache key (python --version) - INICIO"
            python --version > cache-key.txt
            cat cache-key.txt
            echo "[STEP] Compute venv cache key (python --version) - FIN"
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
      - run:
          # Lock universal en venv cacheado: en cache hit, pip re-verifica el
          # lock como no-op rápido.
          name: Install runtime deps from universal lock (require-hashes)
          command: |
            echo "[STEP] Install runtime deps from universal lock (require-hashes) - INICIO"
            python -m venv ~/.venv
            echo "source ~/.venv/bin/activate" >> $BASH_ENV
            source ~/.venv/bin/activate
            python -m pip install pip==26.1.2
            python -m pip install -r requirements-lock.txt --require-hashes
            echo "[STEP] Install runtime deps from universal lock (require-hashes) - FIN"
      - save_cache:
          key: venv-v1-{{ arch }}-{{ checksum "cache-key.txt" }}-{{ checksum "requirements-lock.txt" }}
          paths:
            - ~/.venv
      - run:
          # La herramienta de build (PyInstaller) se instala DESPUÉS del save_cache,
          # sobre el venv ya poblado: así queda fuera del material cacheado y la
          # caché de venv la comparten test-macos y este build.
          name: Install PyInstaller into venv (post-cache)
          command: |
            echo "[STEP] Install PyInstaller into venv (post-cache) - INICIO"
            python -m pip install pyinstaller==6.21.0
            echo "[STEP] Install PyInstaller into venv (post-cache) - FIN"
      - run:
          # create-dmg es un script de shell distribuido por Homebrew, no un
          # paquete de PyPI: `pip3 install create-dmg` fallaba siempre
          # (con o sin pin), independientemente de esta auditoría. Homebrew
          # no soporta fijar una versión exacta de forma simple (a diferencia
          # de pip), así que se deja sin pin explícito; y como no se pinea,
          # el `brew update` implícito (minutos de wall-time) tampoco aporta:
          # HOMEBREW_NO_AUTO_UPDATE=1 lo suprime.
          name: Install create-dmg via Homebrew (no auto-update)
          command: |
            echo "[STEP] Install create-dmg via Homebrew (no auto-update) - INICIO"
            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
            echo "[STEP] Install create-dmg via Homebrew (no auto-update) - FIN"
      - run:
          name: Build macOS arm64 .app via PyInstaller
          no_output_timeout: 20m
          command: |
            echo "[STEP] Build macOS arm64 .app via PyInstaller - INICIO"
            python3 scripts/build_macos.py --arch arm64
            echo "[STEP] Build macOS arm64 .app via PyInstaller - FIN"
      - run:
          # Ejecuta el binario congelado dentro del .app para detectar
          # empaquetados rotos antes de publicar. `version` no carga el modelo;
          # exit 0 obligatorio.
          name: Smoke test dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar (version + voces de fábrica)
          command: |
            echo "[STEP] Smoke test dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar - INICIO"
            dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar version
            # S3-07: valida que las voces de fábrica (en particular 'default')
            # quedaron empaquetadas en el bundle. `voice list` no carga el
            # modelo; el grep -qx aborta el step si 'default' no viaja en el bundle.
            dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar voice list | grep -qx '  - default'
            echo "[STEP] Smoke test dist/tts-sidecar-arm64.app/Contents/MacOS/tts-sidecar - FIN"
      - run:
          # Copia única del .dmg VERSIONADO (nombre de release, con arch) al
          # directorio de workspace para `publish-release`. Fail-fast: sin match,
          # el glob se pasa literal a cp → error → el step aborta (bash -eo pipefail).
          name: Stage versioned macOS arm64 .dmg into workspace dir
          command: |
            echo "[STEP] Stage versioned macOS arm64 .dmg into workspace dir - INICIO"
            mkdir -p artifacts
            cp dist/tts-sidecar-*-arm64.dmg artifacts/
            echo "[STEP] Stage versioned macOS arm64 .dmg into workspace dir - FIN"
      - run:
          # N-04: SHA-256 del artefacto ya staged en artifacts/, en el log del CI;
          # única verificación de integridad posible sin firma de código (R-38).
          name: Emit SHA-256 of staged macOS arm64 .dmg
          command: |
            echo "[STEP] Emit SHA-256 of staged macOS arm64 .dmg - INICIO"
            shasum -a 256 artifacts/tts-sidecar-*-arm64.dmg
            echo "[STEP] Emit SHA-256 of staged macOS arm64 .dmg - FIN"
      - persist_to_workspace:
          root: artifacts
          paths:
            - tts-sidecar-*-arm64.dmg

  publish-release:
    # CD estrategia 1 (GitHub Releases). Solo corre en tags `v*` (ver el
    # workflow). Recolecta los 4 artefactos VERSIONADOS por workspace (no
    # `gh run download`: determinista, sin token de API de CircleCI), genera
    # SHA256SUMS.txt y publica el GitHub Release directo (sin draft) con notas
    # del CHANGELOG; el tag es el punto de no retorno. Requiere el context
    # `github-release` con GH_TOKEN (fine-grained PAT, contents:write).
    docker:
      - image: cimg/base:current
    steps:
      - checkout                       # para CHANGELOG.md y el cotejo de notas
      - attach_workspace:
          at: artifacts
      - run:
          # gh CLI desde el repo apt oficial de GitHub (pineado por su propia
          # firma GPG); no viene preinstalado en cimg/base.
          name: Install gh CLI from official apt repo (signed)
          command: |
            echo "[STEP] Install gh CLI from official apt repo (signed) - INICIO"
            set -euo pipefail
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh
            echo "[STEP] Install gh CLI from official apt repo (signed) - FIN"
      - run:
          # Los 4 artefactos ya llegan con su nombre de release (versionado, con
          # arch); solo falta el manifiesto de checksums. Fail-fast: sin los 4
          # artefactos en el workspace, sha256sum falla y el step aborta.
          name: Generate SHA256SUMS.txt over workspace artifacts
          command: |
            echo "[STEP] Generate SHA256SUMS.txt over workspace artifacts - INICIO"
            set -euo pipefail
            cd artifacts
            sha256sum tts-sidecar-* > SHA256SUMS.txt
            cat SHA256SUMS.txt
            echo "[STEP] Generate SHA256SUMS.txt over workspace artifacts - FIN"
      - run:
          # Extrae la sección `## [X.Y.Z]` del CHANGELOG (X.Y.Z = tag sin la `v`)
          # hasta el siguiente `## [`. Fail-fast si la sección no existe: evita
          # publicar un Release con notas vacías.
          name: Extract release notes from CHANGELOG section
          command: |
            echo "[STEP] Extract release notes from CHANGELOG section - INICIO"
            set -euo pipefail
            VERSION="${CIRCLE_TAG#v}"
            # Corta en el siguiente `## [` (próxima versión) o en el bloque de
            # referencias de enlaces del pie (`[label]: url`), que sigue a la
            # última sección y no debe filtrarse a las notas.
            awk -v ver="## [$VERSION]" '
              index($0, ver) == 1 { grab=1; print; next }
              grab && /^## \[/ { exit }
              grab && /^\[[^][]*\]:/ { exit }
              grab { print }
            ' CHANGELOG.md > notes.md
            if [ ! -s notes.md ]; then
              echo "ERROR: no se encontró la sección [$VERSION] en CHANGELOG.md" >&2
              exit 1
            fi
            cat notes.md
            echo "[STEP] Extract release notes from CHANGELOG section - FIN"
      - run:
          # S3-06 (GPLv3 §6): inyecta en las notas del release la oferta de
          # código fuente canónica — tarball del tag y enlace al tag — para que
          # TODO release futuro cumpla el compliance de fuente sin depender de
          # que el humano la añada a mano. El pie se anexa a notes.md (ya
          # recortado del CHANGELOG por el paso anterior).
          name: Append GPL source-offer footer to release notes
          command: |
            echo "[STEP] Append GPL source-offer footer to release notes - INICIO"
            set -euo pipefail
            {
              echo ""
              echo "---"
              echo ""
              echo "## Código fuente (oferta GPLv3 §6)"
              echo ""
              echo "Este release se distribuye bajo **GPL-3.0-or-later**. El código"
              echo "fuente correspondiente a este tag está disponible en:"
              echo ""
              echo "- Tarball de fuente: https://github.com/CristianRojas-SoftwareEngineer/TTS-Sidecar/archive/refs/tags/${CIRCLE_TAG}.tar.gz"
              echo "- Etiqueta del release: https://github.com/CristianRojas-SoftwareEngineer/TTS-Sidecar/releases/tag/${CIRCLE_TAG}"
            } >> notes.md
            echo "[STEP] Append GPL source-offer footer to release notes - FIN"
      - run:
          # Publica el Release directo (sin draft) con los 5 assets (4
          # artefactos + SHA256SUMS.txt). Si el tag ya tiene Release, `gh
          # release create` falla ruidosamente (correcto: no re-publica en
          # silencio).
          name: Create GitHub Release (direct publish) with 4 artifacts + SHA256SUMS
          command: |
            echo "[STEP] Create GitHub Release (direct publish) with 4 artifacts + SHA256SUMS - INICIO"
            set -euo pipefail
            gh release create "$CIRCLE_TAG" \
              artifacts/tts-sidecar-* artifacts/SHA256SUMS.txt \
              --title "$CIRCLE_TAG" \
              --notes-file notes.md
            echo "[STEP] Create GitHub Release (direct publish) with 4 artifacts + SHA256SUMS - FIN"

  publish-metadata:
    # Cask de Homebrew (docs/SELF-HOSTED-INSTALL.md): tras cada Release público,
    # reescribe Casks/tts-sidecar.rb en el tap propio `homebrew-tts-sidecar` con
    # la versión del tag y el sha256 del .dmg arm64, leído del SHA256SUMS.txt ya
    # público (gh release download, sin depender del workspace del pipeline: es
    # durable e idempotente, el reintento en cualquier momento es seguro).
    # Requiere el context `homebrew-tap` (HOMEBREW_TAP_PAT, permiso Contents:RW
    # solo sobre el tap). El PRIMER Cask del tap es un bootstrap manual único
    # (docs/RELEASING.md): este job actualiza un Cask que ya debe existir.
    docker:
      - image: cimg/base:current
    steps:
      - checkout                       # para scripts/render_cask.py
      - run:
          # gh CLI desde el repo apt oficial de GitHub (mismo patrón que
          # publish-release, pineado por su propia firma GPG).
          name: Install gh CLI from official apt repo (signed)
          command: |
            echo "[STEP] Install gh CLI from official apt repo (signed) - INICIO"
            set -euo pipefail
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh git python3 ruby
            echo "[STEP] Install gh CLI from official apt repo (signed) - FIN"
      - run:
          # SHA256SUMS.txt ya es público (publicado por publish-release);
          # se recupera con gh (necesita GH_TOKEN del context `github-release`
          # para no toparse con el rate-limit anónimo de la API).
          name: Download SHA256SUMS.txt from the just-published release
          command: |
            echo "[STEP] Download SHA256SUMS.txt from the just-published release - INICIO"
            set -euo pipefail
            gh release download "$CIRCLE_TAG" -R "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME" \
              -p SHA256SUMS.txt --dir /tmp/release-metadata
            echo "[STEP] Download SHA256SUMS.txt from the just-published release - FIN"
      - run:
          name: Render Casks/tts-sidecar.rb
          command: |
            echo "[STEP] Render Casks/tts-sidecar.rb - INICIO"
            set -euo pipefail
            python3 scripts/render_cask.py \
              --tag "$CIRCLE_TAG" \
              --sums-file /tmp/release-metadata/SHA256SUMS.txt \
              --out /tmp/tap-clone/Casks/tts-sidecar.rb
            echo "[STEP] Render Casks/tts-sidecar.rb - FIN"
      - run:
          # Check estático viable sin un Mac: `brew audit`/`brew style` exigen
          # una instalación completa de Homebrew (costosa en un runner Linux
          # solo para este generador); `ruby -c` verifica al menos que el Cask
          # generado es Ruby sintácticamente válido antes de empujarlo al tap.
          name: Syntax-check rendered Cask (ruby -c)
          command: |
            echo "[STEP] Syntax-check rendered Cask (ruby -c) - INICIO"
            ruby -c /tmp/tap-clone/Casks/tts-sidecar.rb
            echo "[STEP] Syntax-check rendered Cask (ruby -c) - FIN"
      - run:
          # Clona el tap con el PAT del context (write-scoped solo al tap),
          # sobrescribe el Cask ya renderizado en /tmp/tap-clone y hace push.
          # Sin cambios reales (regenerar y re-empujar con los mismos inputs),
          # el commit es un no-op detectado por `git diff --quiet`.
          name: Clone tap, commit rendered Cask, and push
          command: |
            echo "[STEP] Clone tap, commit rendered Cask, and push - INICIO"
            set -euo pipefail
            RENDERED="/tmp/tap-clone/Casks/tts-sidecar.rb"
            git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/CristianRojas-SoftwareEngineer/homebrew-tts-sidecar.git" /tmp/tap-repo
            mkdir -p /tmp/tap-repo/Casks
            cp "$RENDERED" /tmp/tap-repo/Casks/tts-sidecar.rb
            cd /tmp/tap-repo
            git config user.name "tts-sidecar-ci"
            git config user.email "ci@tts-sidecar.invalid"
            git add Casks/tts-sidecar.rb
            if git diff --cached --quiet; then
              echo "Cask sin cambios (regeneración idempotente); nada que empujar."
            else
              git commit -m "Cask: actualizar a ${CIRCLE_TAG}"
              git push origin HEAD:main
            fi
            echo "[STEP] Clone tap, commit rendered Cask, and push - FIN"

  publish-pypi:
    # Canal de distribución A (docs/DISTRIBUTION.md): publica el sdist+wheel a
    # PyPI en el mismo tag `v*` que dispara los 4 builds nativos, en paralelo a
    # ellos (el paquete no depende de PyInstaller). PyPI no soporta trusted
    # publishing desde CircleCI, así que la autenticación usa un token API
    # (PYPI_API_TOKEN) en el context aislado `pypi-publish`, que ningún otro
    # job ve. La publicación es irreversible (un paquete subido no se puede
    # sobrescribir, solo yankear): el smoke test en un venv limpio corre antes
    # del upload para no publicar un wheel roto.
    docker:
      - image: cimg/python:3.13@sha256:9d189f873178a2bea234b7d51e31e1ae01a73646e962cf697f757b588f8d77b6
    steps:
      - checkout
      - run:
          name: Install build tooling (build, twine)
          command: |
            echo "[STEP] Install build tooling (build, twine) - INICIO"
            pip install build==1.2.2.post1 twine==6.1.0
            echo "[STEP] Install build tooling (build, twine) - FIN"
      - run:
          name: Build sdist and wheel
          command: |
            echo "[STEP] Build sdist and wheel - INICIO"
            python -m build
            echo "[STEP] Build sdist and wheel - FIN"
      - run:
          name: Validate package metadata (twine check)
          command: |
            echo "[STEP] Validate package metadata (twine check) - INICIO"
            twine check dist/*
            echo "[STEP] Validate package metadata (twine check) - FIN"
      - run:
          # Instala el wheel recién construido en un venv limpio (sin las
          # dependencias pesadas del repo) y verifica que el entry point
          # funciona y que la voz 'default' viaja dentro del wheel, antes de
          # publicar en un canal donde la publicación es irreversible.
          name: Smoke test wheel in a clean venv
          command: |
            echo "[STEP] Smoke test wheel in a clean venv - INICIO"
            set -euo pipefail
            python -m venv /tmp/smoke-venv
            source /tmp/smoke-venv/bin/activate
            pip install dist/*.whl
            EXPECTED_VERSION="${CIRCLE_TAG#v}"
            ACTUAL_VERSION="$(tts-sidecar version --json | python -c 'import json, sys; print(json.load(sys.stdin)["version"])')"
            if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
              echo "ERROR: version del wheel ($ACTUAL_VERSION) no coincide con el tag ($EXPECTED_VERSION)" >&2
              exit 1
            fi
            python -c "from tts_sidecar import voices; assert 'default' in voices.list_voices(), 'voz default ausente del wheel'"
            deactivate
            echo "[STEP] Smoke test wheel in a clean venv - FIN"
      - run:
          # Upload final: PYPI_API_TOKEN viene del context `pypi-publish`
          # (prerequisito operativo documentado en docs/RELEASING.md).
          name: Publish to PyPI (twine upload)
          command: |
            echo "[STEP] Publish to PyPI (twine upload) - INICIO"
            TWINE_USERNAME=__token__ TWINE_PASSWORD="$PYPI_API_TOKEN" twine upload --skip-existing dist/*
            echo "[STEP] Publish to PyPI (twine upload) - FIN"

workflows:
  build-all:
    # CircleCI NO ejecuta un job en un tag salvo que el job Y todas sus
    # dependencias declaren `filters.tags`; por eso el filtro `tags: only /^v.*/`
    # se propaga por toda la cadena (tests → builds → publish-release). Todos
    # los jobs declaran además `branches: ignore /.*/`: el pipeline completo
    # corre SOLO en tags `v*`, nunca en pushes de rama.
    jobs:
      - test-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-macos:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-installer-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-installer-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-installer-macos:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-windows-x64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
            - test-installer-linux
            - test-installer-windows
            - test-installer-macos
      - build-linux-x64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
            - test-installer-linux
            - test-installer-windows
            - test-installer-macos
      - build-linux-arm64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
            - test-installer-linux
            - test-installer-windows
            - test-installer-macos
      - build-darwin-arm64:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
            - test-installer-linux
            - test-installer-windows
            - test-installer-macos
      - publish-release:
          context:
            - github-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - build-windows-x64
            - build-linux-x64
            - build-linux-arm64
            - build-darwin-arm64
      - publish-metadata:
          context:
            - github-release
            - homebrew-tap
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - publish-release
      - publish-pypi:
          context:
            - pypi-publish
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
          requires:
            - test-linux
            - test-windows
            - test-macos
